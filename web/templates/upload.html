<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - MgFileBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css?v=20260711-21">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a href="/upload" class="brand-mark">
        <svg class="brand-mark__cube" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <span class="brand-mark__name">MgFileBox</span>
      </a>
      <nav class="nav-pills">
        <a href="/upload" class="nav-pill {{ if eq .ActiveNav "upload" }}is-active{{ end }}">上传</a>
        <a href="/admin/shares" class="nav-pill">管理</a>
        <a href="/logout" class="nav-pill">退出</a>
      </nav>
    </header>

    <main class="panel panel-wide">
      <section class="stack-xl">
        <form id="share-form" class="upload-layout" enctype="multipart/form-data">
          <!-- 上卡片：拖拽上传区 -->
          <div class="panel-wide">
            <label class="upload-dropzone" for="file-input" id="dropzone">
              <input id="file-input" name="files" type="file" multiple hidden>
              <div class="upload-icon-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
              </div>
              <div class="upload-text">
                <span class="text-soft" id="file-name" style="font-size: 0.95rem;">点击选择文件，也可以拖拽到这里</span>
              </div>
            </label>
            <section class="selected-files" id="selected-files" aria-live="polite" hidden>
              <header class="selected-files__header">
                <h3>文件列表</h3>
                <div class="selected-files__summary">
                  <span id="selected-files-summary"></span>
                  <button type="button" class="selected-files__clear" id="clear-selected-files" aria-label="清空全部文件" title="清空全部文件">
                    <svg aria-hidden="true" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="12" cy="12" r="9"></circle>
                      <path d="M9 9l6 6M15 9l-6 6"></path>
                    </svg>
                  </button>
                </div>
              </header>
              <div class="selected-files__list" id="selected-files-list"></div>
            </section>
          </div>

          <!-- 下卡片：配置区 -->
          <section class="panel-wide config-card">
            <div class="grid-two">
              <label class="field">
                <span>提取码</span>
                <div class="input-with-icon">
                  <svg class="input-icon field-prefix-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                  </svg>
                  <input type="password" name="access_password" placeholder="留空则无需提取码">
                </div>
              </label>

              <label class="field">
                <span>过期时间</span>
                <div class="custom-select" id="expires-select">
                  <input type="hidden" name="expires_hours" value="24">
                  <div class="custom-select__trigger">
                    <span class="custom-select__content">
                      <svg class="custom-select__prefix-icon field-prefix-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="8.5"></circle>
                        <path d="M12 8v4.25h3.25"></path>
                      </svg>
                      <span class="custom-select__value">24 小时</span>
                    </span>
                    <svg class="custom-select__icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                  </div>
                  <div class="custom-select__options">
                    <div class="custom-select__option" data-value="1">1 小时</div>
                    <div class="custom-select__option" data-value="6">6 小时</div>
                    <div class="custom-select__option is-selected" data-value="24">24 小时</div>
                    <div class="custom-select__option" data-value="72">3 天</div>
                    <div class="custom-select__option" data-value="168">7 天</div>
                    <div class="custom-select__option" data-value="0">永不过期</div>
                  </div>
                </div>
              </label>
            </div>
          </section>

          <!-- 独立居中的按钮 -->
          <div class="action-row-center">
            <button type="submit" class="button button-primary">生成分享链接</button>
            <p id="upload-message" class="form-message" hidden></p>
          </div>
        </form>

        <section class="result-card result-card--success" id="upload-result" hidden>
          <div class="result-success-icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5"></path>
            </svg>
          </div>
          <div class="result-heading">
            <h2>分享已创建</h2>
            <p>复制下面的链接发送给需要的人</p>
          </div>
          <div class="share-link-box">
            <input id="share-url" class="mono" type="text" aria-label="分享链接" readonly>
            <button type="button" class="button button-primary button-compact" data-copy-target="share-url">
              <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="14" height="14" x="8" y="8" rx="2"></rect>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path>
              </svg>
              复制链接
            </button>
          </div>
          <div class="result-actions">
            <a id="share-visit-link" class="button button-secondary" target="_blank" rel="noreferrer">打开分享页</a>
            <button id="reset-share-form" type="button" class="button button-ghost">创建新分享</button>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="/static/app.js?v=20260711-21"></script>
</body>
</html>
