<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - MgFileBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css?v=20260711-21">
</head>
<body class="auth-shell">
  <main class="auth-layout auth-layout--single">
    <section class="auth-panel auth-panel--centered">
      <div class="login-brand">
        <svg aria-hidden="true" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
          <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <h1 class="auth-title">MgFileBox</h1>
      </div>
      <p class="auth-subtitle muted">请输入管理员密码继续访问</p>

      <form id="login-form" class="auth-form stack-lg" action="/api/auth/login" method="post">
        <div class="field">
          <label class="sr-only" for="admin-password">管理员密码</label>
          <input id="admin-password" type="password" name="password" autocomplete="current-password" placeholder="管理员密码" required class="input-large">
        </div>
        <button type="submit" class="button button-primary button-large button-block">登录</button>
        <p id="login-message" class="form-message" hidden></p>
      </form>
    </section>
  </main>

  <script src="/static/app.js?v=20260711-21"></script>
</body>
</html>
