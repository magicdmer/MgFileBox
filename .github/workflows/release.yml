name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version used for manual test packages, for example 0.1.0-test"
        required: false
        default: ""
      create_release:
        description: "Create a GitHub Release when manually triggered"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build release packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${version}"

      - name: Test
        run: go test ./...

      - name: Check JavaScript syntax
        run: node --check web/static/app.js

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p dist/bin

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/bin/mgfilebox-linux-amd64 ./cmd/server

          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o dist/bin/mgfilebox-windows-amd64.exe ./cmd/server

      - name: Package Linux
        shell: bash
        run: |
          package_dir="dist/package/mgfilebox"
          rm -rf "${package_dir}"
          mkdir -p "${package_dir}"

          cp dist/bin/mgfilebox-linux-amd64 "${package_dir}/mgfilebox"
          chmod +x "${package_dir}/mgfilebox"
          cp .env.example README.md LICENSE "${package_dir}/"
          cp -R web "${package_dir}/web"
          cp -R docs "${package_dir}/docs"

          tar -C dist/package -czf "dist/mgfilebox-v${{ steps.version.outputs.version }}-linux-amd64.tar.gz" mgfilebox

      - name: Package Windows
        shell: bash
        run: |
          package_dir="dist/package/mgfilebox"
          rm -rf "${package_dir}"
          mkdir -p "${package_dir}"

          cp dist/bin/mgfilebox-windows-amd64.exe "${package_dir}/mgfilebox.exe"
          cp .env.example README.md LICENSE "${package_dir}/"
          cp -R web "${package_dir}/web"
          cp -R docs "${package_dir}/docs"

          (cd dist/package && zip -r "../mgfilebox-v${{ steps.version.outputs.version }}-windows-amd64.zip" mgfilebox)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mgfilebox-release-packages
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('manual-v{0}', steps.version.outputs.version) }}
          name: MgFileBox v${{ steps.version.outputs.version }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            dist/*.tar.gz
            dist/*.zip
